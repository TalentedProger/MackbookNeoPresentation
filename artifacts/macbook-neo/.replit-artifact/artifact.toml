kind = "web"
previewPath = "/"
title = "MacBook Neo"
version = "1.0.0"
id = "artifacts/macbook-neo"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 20325

[services.development]
run = "pnpm --filter @workspace/macbook-neo run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/macbook-neo", "run", "build" ]
publicDir = "artifacts/macbook-neo/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "20325"
BASE_PATH = "/"
